Builds:
  - versionName: 6.1.3
    versionCode: 40
    commit: 11d348921bb1ee9d2a818d04864b7f23728c9b33
    subdir: app
    sudo:
      - apt-get update
      - apt-get install -y wget
      - wget -qO- https://go.dev/dl/go1.22.2.linux-amd64.tar.gz | tar -C /usr/local
        -xzf -
    gradle:
      - yes
    output: build/outputs/apk/release/app-universal-release-unsigned.apk
    rm:
      - app/libs
    build:
      - sdkmanager 'platforms;android-24'
      - export PATH="/usr/local/go/bin:$PATH"
      - export GOPATH="$PWD/.gopath"
      - export PATH="$GOPATH/bin:$PATH"
      - export GOFLAGS="-buildvcs=false"
      - go version
      - go install golang.org/x/mobile/cmd/gomobile@v0.0.0-20240404231514-09dbf07665ed
      - gomobile init
      - mkdir -p libs
      - cd ../tunnel
      - gomobile bind -target=android -androidapi 24 -trimpath -ldflags='-s -w -extldflags=-Wl,-z,max-page-size=16384'
        -o ../app/libs/tunnel.aar github.com/nqmgaming/blockads-tunnel
    ndk: r26b

